name: Check workflow on pull request to master
on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_TESTS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASS_TESTS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_TESTS }}
          # хост и порт в тестах всегда по умолчанию
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repo code
        uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.0
          pip install -r ./requirements.txt
      - name: Create .env и .env.testing
        run: |
          cp .env.example .env
          cp .env.testing.example .env.testing
      - name: Lint with ruff
        run: python -m ruff check ./
      - name: Run tests
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: pytest