services:
  postgres:
    image: postgres:17-alpine
    container_name: iot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${STORAGE__POSTGRESQL__USER__USERNAME:-admin}
      POSTGRES_PASSWORD: ${STORAGE__POSTGRESQL__USER__PASSWORD:-password}
      POSTGRES_DB:       ${STORAGE__POSTGRESQL__DBNAME:-iotgateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORAGE__POSTGRESQL__USER__USERNAME:-admin} -d ${STORAGE__POSTGRESQL__DBNAME:-iotgateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iot-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:

      STORAGE_TYPE: postgresql
      STORAGE_DB_CONNSTR: >-
        postgresql://${STORAGE__POSTGRESQL__USER__USERNAME:-admin}:${STORAGE__POSTGRESQL__USER__PASSWORD:-password}
        @postgres:5432/${STORAGE__POSTGRESQL__DBNAME:-iotgateway}?application_name=STORAGE__POSTGRESQL__APP_NAME
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data  # на случай fallback на SQLite
    ports:
      - "${ADAPTERS__HTTP__PORT:-8081}:8081"  # HTTP
      - "${ADAPTERS__WEBSOCKET__PORT:-8082}:8082"  # WebSocket
      - "${ADAPTERS__COAP__PORT:-5683}:5683/udp" # CoAP (UDP)
    networks:
      - iot-net

volumes:
  postgres_data:

networks:
  iot-net:
