services:
  postgres:
    image: postgres:17-alpine
    container_name: iot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       ${POSTGRES_DB:-iotgateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-iotgateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iot-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:

      STORAGE_TYPE: postgresql
      STORAGE_DB_CONNSTR: >-
        postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}
        @postgres:5432/${POSTGRES_DB:-iotgateway}?application_name=gateway
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data  # на случай fallback на SQLite
    ports:
      - "${HTTP_PORT:-8081}:8081"  # HTTP
      - "${WS_PORT:-8082}:8082"  # WebSocket
      - "${COAP_PORT:-5683}:5683/udp" # CoAP (UDP)
      - "${MQTT_PORT:-1883}:1883"  # MQTT
    networks:
      - iot-net

volumes:
  postgres_data:

networks:
  iot-net:
